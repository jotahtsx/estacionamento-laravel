services:
  db:
    image: postgres:15-alpine
    container_name: estacionamento_db
    restart: always
    environment:
      POSTGRES_DB: estacionamento_db
      POSTGRES_USER: dev_user
      POSTGRES_PASSWORD: dev_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: